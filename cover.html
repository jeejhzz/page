        .logo-text {
            font-family: 'DnoWordmark', 'Pretendard', -apple-system, sans-serif;
            font-weight: 700;
            letter-spacing: -0.045em;
            display: block;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .job-category-card {
            background: rgba(255, 255, 255, 0.02);
            border-left: 4px solid var(--brand-orange);
            transition: all 0.3s ease;
        }
        .job-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 107, 0, 0.05);
            border: 1px solid rgba(255, 107, 0, 0.15);
            padding: 0.85rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .job-link:hover {
            background: rgba(255, 107, 0, 0.2);
            border-color: var(--brand-orange);
            transform: translateX(6px);
            color: white;
        }
        .section-title {
            position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -8px;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--brand-orange), transparent);
            border-radius: 2px;
        }
        .news-link {
            color: var(--brand-orange);
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-color: rgba(255, 107, 0, 0.3);
            transition: all 0.2s ease;
        }
        .news-link:hover {
            text-decoration-color: var(--brand-orange);
            background: rgba(255, 107, 0, 0.1);
            border-radius: 4px;
        }
        /* Video Container for 16:9 ratio */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* Badge Modules */
        .badge-module {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 1.25rem;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border-radius: 9999px;
            transition: all 0.2s ease;
        }
        .top-hero {
            position: relative;
            min-height: 92vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            isolation: isolate;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--brand-navy);
        }
        .top-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.026) 1px, transparent 1px);
            background-size: 68px 68px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.72), transparent 84%);
            z-index: -2;
        }
        .top-hero::after {
            content: '';
            position: absolute;
            inset: auto -12% -36% -12%;
            height: 56%;
            background: radial-gradient(ellipse at center, rgba(255, 107, 0, 0.11), transparent 68%);
            filter: blur(18px);
            z-index: -1;
        }
        .hero-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            color: #ffb27a;
            border: 1px solid rgba(255, 107, 0, 0.30);
            background: rgba(255, 107, 0, 0.07);
            padding: 0.55rem 0.9rem;
            border-radius: 9999px;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .hero-kicker::before {
            content: '';
            width: 0.48rem;
            height: 0.48rem;
            border-radius: 9999px;
            background: var(--brand-orange);
            box-shadow: 0 0 16px rgba(255, 107, 0, 0.8);
        }
        .semiconductor-stage {
            position: relative;
            min-height: 420px;
            display: grid;
            place-items: center;
            perspective: 1200px;
        }
        .chip-orbit {
            position: absolute;
            width: min(86vw, 540px);
            aspect-ratio: 1;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow: inset 0 0 76px rgba(255,107,0,0.07);
            animation: heroPulse 5.5s ease-in-out infinite;
        }
        .chip-visual {
            position: relative;
            width: min(78vw, 460px);
            aspect-ratio: 1.18;
            transform: rotateX(58deg) rotateZ(-24deg) translateY(0);
            transform-style: preserve-3d;
            animation: chipFloat 6.5s ease-in-out infinite;
            filter: drop-shadow(0 34px 42px rgba(0,0,0,0.46));
        }
        .chip-board {
            position: absolute;
            inset: 9% 2%;
            border-radius: 2rem;
            background:
                linear-gradient(90deg, transparent 0 8%, rgba(255,107,0,0.44) 8.4% 8.9%, transparent 9.3% 20%, rgba(255,255,255,0.14) 20.3% 20.7%, transparent 21% 100%),
                linear-gradient(0deg, transparent 0 13%, rgba(255,107,0,0.34) 13.3% 13.8%, transparent 14.2% 37%, rgba(255,255,255,0.13) 37.4% 37.8%, transparent 38.2% 100%),
                linear-gradient(145deg, rgba(8,26,42,0.98), rgba(0,13,26,0.98));
            border: 1px solid rgba(255,255,255,0.14);
            box-shadow: inset 0 0 35px rgba(255,255,255,0.035), 0 0 70px rgba(255,107,0,0.13);
        }
        .chip-core {
            position: absolute;
            inset: 25% 27%;
            border-radius: 1.2rem;
            background:
                radial-gradient(circle at 34% 28%, rgba(255,255,255,0.82), transparent 2.5%),
                linear-gradient(135deg, rgba(255,118,28,0.9), rgba(255,255,255,0.22) 46%, rgba(10,23,38,0.95));
            border: 1px solid rgba(255,255,255,0.24);
            box-shadow: 0 0 38px rgba(255,107,0,0.48), inset 0 0 24px rgba(255,255,255,0.14);
            transform: translateZ(42px);
            overflow: hidden;
        }
        .chip-core::before {
            content: '';
            position: absolute;
            inset: -40%;
            background: linear-gradient(110deg, transparent 28%, rgba(255,255,255,0.62) 48%, transparent 64%);
            animation: chipGleam 4.8s ease-in-out infinite;
        }
        .chip-pins span {
            position: absolute;
            width: 0.58rem;
            height: 2.35rem;
            border-radius: 9999px;
            background: linear-gradient(#ffb27a, #ff6b00);
            box-shadow: 0 0 12px rgba(255,107,0,0.44);
            transform: translateZ(20px);
        }
        .chip-pins span:nth-child(1) { left: 14%; top: 11%; }
        .chip-pins span:nth-child(2) { left: 27%; top: 7%; }
        .chip-pins span:nth-child(3) { left: 54%; top: 8%; }
        .chip-pins span:nth-child(4) { left: 75%; top: 13%; }
        .chip-pins span:nth-child(5) { right: 9%; top: 36%; transform: translateZ(20px) rotate(90deg); }
        .chip-pins span:nth-child(6) { right: 8%; top: 61%; transform: translateZ(20px) rotate(90deg); }
        .chip-pins span:nth-child(7) { left: 21%; bottom: 8%; }
        .chip-pins span:nth-child(8) { left: 66%; bottom: 9%; }
        .role-intro {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 4.5rem 0 5rem;
        }
        .role-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
        }
        .role-tab {
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #bfdbfe;
            padding: 0.55rem 1.05rem;
            border-radius: 9999px;
            font-size: 0.86rem;
            font-weight: 800;
            transition: all 0.2s ease;
        }
        .role-tab:hover {
            border-color: rgba(124, 140, 255, 0.36);
            color: white;
            background: rgba(124, 140, 255, 0.12);
        }
        .role-tab.is-active {
            color: white;
            background: linear-gradient(135deg, #6856ff, #4936df);
            border-color: rgba(255, 255, 255, 0.16);
            box-shadow: 0 12px 28px rgba(73, 54, 223, 0.3);
        }
        .role-empty-message {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.03);
            color: #cbd5e1;
            font-weight: 700;
            text-align: center;
        }
        .role-empty-message.is-visible {
            display: block;
        }
        .role-card {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            background: #0f1a2c;
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
            flex: 0 0 calc((100% - 1.5rem) / 2);
            display: flex;
            flex-direction: column;
            scroll-snap-align: start;
        }
        .role-card[data-interview-id] {
            cursor: pointer;
        }
        .role-card[data-interview-id]:hover {
            border-color: rgba(124, 140, 255, 0.34);
            transform: translateY(-3px);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .role-card-grid {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            padding: 0.15rem 0.1rem 0.5rem;
        }
        .role-card-grid::-webkit-scrollbar {
            display: none;
        }
        .role-card-controls {
            display: flex;
            justify-content: flex-end;
            gap: 0.65rem;
            margin-bottom: 1rem;
        }
        .role-card-control {
            width: 2.7rem;
            height: 2.7rem;
            display: inline-grid;
            place-items: center;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1.25rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .role-card-control:hover {
            border-color: rgba(255, 107, 0, 0.35);
            background: rgba(255, 107, 0, 0.12);
        }
        .role-card-image {
            position: relative;
            aspect-ratio: 4 / 3;
            min-height: 0;
            background: #091527;
        }
        .role-card-image.is-empty {
            background:
                linear-gradient(135deg, rgba(255, 107, 0, 0.08), transparent 34%),
                radial-gradient(circle at 78% 16%, rgba(124, 140, 255, 0.18), transparent 30%),
                linear-gradient(145deg, #111c30, #071225);
        }
        .role-card-image.is-empty::before {
            content: '';
            position: absolute;
            inset: 1.1rem;
            border-radius: 0.85rem;
            border: 1px dashed rgba(255, 255, 255, 0.12);
            background:
                linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.45;
        }
        .role-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 24%;
            display: block;
            filter: saturate(0.96) contrast(1.02);
        }
        .role-card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom, rgba(0, 21, 41, 0.04), rgba(0, 21, 41, 0.36) 48%, rgba(0, 21, 41, 0.95)),
                linear-gradient(to right, rgba(0, 21, 41, 0.42), transparent 44%);
        }
        .role-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            border-radius: 0.45rem;
            background: linear-gradient(135deg, #6856ff, #4936df);
            color: white;
            padding: 0.34rem 0.65rem;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.02em;
            box-shadow: 0 10px 24px rgba(73, 54, 223, 0.28);
        }
        .role-card-copy {
            position: absolute;
            left: 1.25rem;
            right: 1.25rem;
            bottom: 1.35rem;
            z-index: 2;
        }
        .role-card-title {
            color: #7c8cff;
            font-size: 0.88rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .role-card-name {
            display: flex;
            align-items: baseline;
            gap: 0.55rem;
            margin-top: 0.35rem;
            flex-wrap: wrap;
        }
        .role-card-name strong {
            color: white;
            font-size: 1.45rem;
            font-weight: 900;
            letter-spacing: -0.03em;
        }
        .role-card-name span {
            color: #cbd5e1;
            font-size: 0.95rem;
            font-weight: 600;
